<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escritura - Té de Algo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --app-bg: #e3ded5;      /* Fondo exterior más envolvente y suave */
    --paper: #fbf9f5;       /* Papel editorial de alta calidad */
    --ink: #1e1e1e;
    --ink-soft: #605e59;
    --ink-ghost: #b5b2aa;
    --accent: #2e432e;      /* Verde bosque profundo y elegante del logo */
    --page-width: 720px;
  }

  html, body {
    background: var(--app-bg);
    min-height: 100vh;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    scroll-behavior: smooth;
    transition: background 0.5s ease;
  }

  /* ── BARRA SUPERIOR PREMIUM (GLASSMORPHISM) ── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 32px;
    background: rgba(227, 222, 213, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  /* Ocultar barra al escribir (Modo distracción libre) */
  #toolbar.hide {
    transform: translateY(-100%);
  }
  #toolbar:hover {
    transform: translateY(0) !important;
  }

  #toolbar-left, #toolbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid rgba(0, 0, 0, 0.15);
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .btn:hover { 
    background: rgba(0, 0, 0, 0.04); 
    color: var(--ink); 
    border-color: rgba(0, 0, 0, 0.3); 
  }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #1f2e1f; border-color: #1f2e1f; }

  #btn-focus {
    border-color: transparent;
    background: rgba(46, 67, 46, 0.08);
    color: var(--accent);
    font-weight: 500;
  }
  #btn-focus:hover { background: rgba(46, 67, 46, 0.15); }
  
  body.focus-mode #btn-focus {
    background: var(--accent);
    color: #fff;
  }

  #book-title-bar {
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    letter-spacing: 0.03em;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    min-width: 240px;
    max-width: 380px;
    flex: 1;
  }
  #book-title-bar::placeholder { color: var(--ink-ghost); font-style: italic; }

  #wordcount {
    font-size: 14px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  /* ── CONTENEDOR UNIFICADO (MANUSCRITO) ── */
  #main {
    max-width: var(--page-width);
    margin: 80px auto 120px;
    background: var(--paper);
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
    border-radius: 6px;
    padding: 90px 90px 100px;
    transition: all 0.5s ease;
  }

  /* Cabecera integrada y limpia */
  #header-logo-wrap {
    text-align: center;
    margin-bottom: 60px;
    transition: opacity 0.4s, transform 0.4s;
  }
  #header-logo-wrap img {
    max-width: 150px;
    height: auto;
    /* TRUCO VISUAL: Quita el fondo blanco del logo PNG de forma dinámica */
    mix-blend-mode: multiply; 
    display: inline-block;
  }

  /* ── AREA PORTADA SEAMLESS ── */
  #cover {
    text-align: center;
    padding-bottom: 60px;
    margin-bottom: 40px;
    border-bottom: 1px dashed rgba(0, 0, 0, 0.08);
    transition: opacity 0.4s, transform 0.4s;
  }

  #cover-title {
    font-family: 'IM Fell English', serif;
    font-size: 46px;
    line-height: 1.25;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    width: 100%;
    resize: none;
    overflow: hidden;
    min-height: 60px;
  }
  #cover-title::placeholder { color: var(--ink-ghost); font-style: dashed; }

  #cover-author {
    font-family: 'EB Garamond', serif;
    font-size: 22px;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    width: 100%;
    margin-top: 24px;
    font-style: italic;
  }
  #cover-author::placeholder { color: var(--ink-ghost); }

  .cover-divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 32px auto;
    opacity: .4;
  }

  /* ── BLOQUES DE CAPÍTULO CONTINUOS ── */
  #chapters {
    display: flex;
    flex-direction: column;
    gap: 60px;
  }

  .chapter {
    position: relative;
    transition: opacity 0.4s, transform 0.4s;
  }

  .chapter-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .chapter-num {
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
    font-style: italic;
  }

  .chapter-title-input {
    font-family: 'IM Fell English', serif;
    font-size: 24px;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    padding-bottom: 2px;
    line-height: 1.3;
  }
  .chapter-title-input::placeholder { color: var(--ink-ghost); font-style: italic; }

  .chapter-body {
    font-family: 'EB Garamond', serif;
    font-size: 19px;
    line-height: 1.95; /* Espaciado premium de lectura */
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    resize: none;
    overflow: hidden;
    min-height: 200px;
    text-align: justify;
  }
  .chapter-body::placeholder { color: var(--ink-ghost); font-style: italic; }

  .chapter-delete {
    position: absolute;
    top: -4px;
    right: -40px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-ghost);
    font-size: 20px;
    padding: 4px;
    border-radius: 50%;
    transition: all .2s ease;
    opacity: 0;
  }
  .chapter:hover .chapter-delete { opacity: 1; }
  .chapter-delete:hover { color: #c0392b; background: rgba(192, 57, 43, 0.08); }

  /* ── BOTÓN AGREGAR CAPÍTULO ── */
  #add-chapter-wrap {
    text-align: center;
    padding: 60px 0 20px;
    transition: opacity 0.4s;
  }

  #add-chapter {
    font-family: 'EB Garamond', serif;
    font-size: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(0, 0, 0, 0.15);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #add-chapter:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    transform: scale(1.08);
  }

  /* ── MODO ENFOQUE EXTREMO (ZEN) ── */
  body.focus-mode {
    background: #dbd6cc; /* Entorno más inmersivo */
  }
  body.focus-mode #main {
    box-shadow: none;
    background: transparent; /* El papel se funde con el fondo */
  }
  body.focus-mode #header-logo-wrap,
  body.focus-mode #cover,
  body.focus-mode #add-chapter-wrap {
    opacity: 0 !important;
    pointer-events: none;
    transform: translateY(10px);
  }
  body.focus-mode .chapter {
    opacity: 0.06;
    transform: scale(0.98);
    pointer-events: none;
  }
  body.focus-mode .chapter.active-focus {
    opacity: 1 !important;
    transform: scale(1) !important;
    pointer-events: auto;
  }

  /* ── AYUDA MEMORIA FLOTANTE MINIMALISTA ── */
  #hotkey-help-wrap {
    position: fixed;
    bottom: 24px;
    left: 32px;
    opacity: 0.25;
    transition: opacity 0.3s, transform 0.4s;
    z-index: 150;
    pointer-events: none;
    color: var(--ink-soft);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #hotkey-help-wrap.hide {
    opacity: 0 !important;
    transform: translateY(20px);
  }

  /* ── PRINT / EXPORT LIBRO FORMATEADO ── */
  @media print {
    #toolbar, #header-logo-wrap, #add-chapter-wrap, .chapter-delete, #hotkey-help-wrap {
        display: none !important;
    }
    body { background: white !important; }
    #main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; box-shadow: none !important;}
    .chapter { page-break-before: always; margin-top: 40mm;}
    #cover { page-break-after: always; margin-top: 60mm; border: none; }
    p { margin-bottom: 0; text-indent: 2em; }
    h1 + p, h2 + p, hr + p, p:first-of-type { text-indent: 0; }
    @page { size: A5; margin: 22mm 18mm; }
  }

  /* SCROLLBAR MODERNA */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--app-bg); }
  ::-webkit-scrollbar-thumb { background: #c5bfb3; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #b0aa9e; }
</style>
</head>
<body onload="loadLocal()">

<!-- TOOLBAR -->
<div id="toolbar">
  <div id="toolbar-left">
    <button class="btn primary" onclick="exportHTML()" title="Descargar Manuscrito (Ctrl+S)">↓ Exportar</button>
    <label class="btn" style="cursor:pointer" title="Cargar archivo HTML (Ctrl+O)">
      ↑ Importar
      <input type="file" accept=".html" style="display:none" onchange="importHTML(event)">
    </label>
    <button id="btn-focus" class="btn" onclick="toggleFocusMode()" title="Alternar Modo Zen (Ctrl+F)">Modo Zen</button>
  </div>

  <input id="book-title-bar" type="text" placeholder="Título del manuscrito…" oninput="syncTitle(this.value); updateWordCount(); saveLocal()" />

  <div id="toolbar-right">
    <span id="wordcount">0 palabras</span>
  </div>
</div>

<!-- MINI AYUDA MEMORIA -->
<div id="hotkey-help-wrap">
  Ctrl+F: Zen | Ctrl+Enter: Cap. Nuevo | Ctrl+S: Guardar
</div>

<!-- CONTENIDO PRINCIPAL (EL PLIEGO DE PAPEL) -->
<div id="main">

  <!-- CABECERA DEL LOGO CON BLEND-MODE AUTOMÁTICO -->
  <div id="header-logo-wrap">
    <img src="Escribir simple. Sin distracciones. (1).png" alt="Té de Algo Logo">
  </div>

  <!-- PORTADA SEAMLESS -->
  <div id="cover">
    <textarea id="cover-title" rows="1" placeholder="Título Principal" oninput="autoResize(this); syncTitleBar(this.value); updateWordCount(); saveLocal()"></textarea>
    <div class="cover-divider"></div>
    <input id="cover-author" type="text" placeholder="Nombre del Autor" oninput="updateWordCount(); saveLocal()">
  </div>

  <!-- SECCIÓN DE CAPÍTULOS -->
  <div id="chapters"></div>

  <!-- BOTÓN INTERNO DE AGREGAR -->
  <div id="add-chapter-wrap">
    <button id="add-chapter" onclick="addChapter()" title="Nuevo Capítulo (Ctrl + Enter)">+</button>
  </div>

</div>

<script>
let chapterCount = 0;
let hideTimeout = null;

// ── COMPORTAMIENTO INTERFAZ OCULTA (DISTRACTION-FREE) ──
function resetHideTimer() {
  const toolbar = document.getElementById('toolbar');
  const help = document.getElementById('hotkey-help-wrap');
  
  // Mostrar elementos al mover mouse o interactuar
  toolbar.classList.remove('hide');
  help.classList.remove('hide');
  
  clearTimeout(hideTimeout);
  
  // Esconder tras 3.5 segundos de inactividad de escritura
  hideTimeout = setTimeout(() => {
    // Solo esconder si el usuario está enfocado escribiendo en el texto
    if (document.activeElement && (document.activeElement.classList.contains('chapter-body') || document.activeElement.classList.contains('chapter-title-input'))) {
      toolbar.classList.add('hide');
      help.classList.add('hide');
    }
  }, 3500);
}

document.addEventListener('mousemove', () => {
  document.getElementById('toolbar').classList.remove('hide');
  document.getElementById('hotkey-help-wrap').classList.remove('hide');
});
document.addEventListener('input', resetHideTimer);

// ── AUTO RESIZE TEXTAREA ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function resizeAll() {
  document.querySelectorAll('textarea').forEach(autoResize);
}

// ── SYNC TÍTULO ──
function syncTitle(val) {
  document.getElementById('cover-title').value = val;
  autoResize(document.getElementById('cover-title'));
}
function syncTitleBar(val) {
  document.getElementById('book-title-bar').value = val;
}

// ── CONTAR PALABRAS ──
function updateWordCount() {
  const texts = [...document.querySelectorAll('textarea, input[type=text]')]
    .map(el => el.value).join(' ');
  const words = texts.trim().split(/\s+/).filter(w => w.length > 0).length;
  document.getElementById('wordcount').textContent = words.toLocaleString('es-AR') + ' palabras';
}

// ── AGREGAR CAPÍTULO ──
function addChapter(titleVal = '', bodyVal = '', forceFocus = true) {
  chapterCount++;
  const div = document.createElement('div');
  div.className = 'chapter';
  div.dataset.id = chapterCount;

  const num = toRoman(chapterCount);

  div.innerHTML = `
    <button class="chapter-delete" title="Eliminar capítulo" onclick="deleteChapter(this)">×</button>
    <div class="chapter-header">
      <span class="chapter-num">Capítulo ${num}</span>
      <input class="chapter-title-input" type="text" placeholder="Título del capítulo (opcional)" value="${escHtml(titleVal)}" onfocus="setFocusTarget(this)" oninput="updateWordCount(); saveLocal()">
    </div>
    <textarea class="chapter-body" placeholder="Empezá a escribir acá…" onfocus="setFocusTarget(this)" oninput="autoResize(this); updateWordCount(); saveLocal()">${escHtml(bodyVal)}</textarea>
  `;

  document.getElementById('chapters').appendChild(div);

  const ta = div.querySelector('.chapter-body');
  autoResize(ta);
  if (forceFocus) ta.focus();
  updateWordCount();
}

// Manejar qué elemento mantiene el foco activo en Modo Zen
function setFocusTarget(el) {
  if (document.body.classList.contains('focus-mode')) {
    document.querySelectorAll('.chapter').forEach(ch => ch.classList.remove('active-focus'));
    el.closest('.chapter').classList.add('active-focus');
  }
}

function deleteChapter(btn) {
  if (!confirm('¿Eliminar este capítulo?')) return;
  btn.closest('.chapter').remove();
  renumberChapters();
  updateWordCount();
  saveLocal();
}

function renumberChapters() {
  document.querySelectorAll('.chapter').forEach((ch, i) => {
    ch.querySelector('.chapter-num').textContent = 'Capítulo ' + toRoman(i + 1);
  });
  chapterCount = document.querySelectorAll('.chapter').length;
}

function toRoman(n) {
  const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let result = '';
  for (let i = 0; i < vals.length; i++) {
    while (n >= vals[i]) { result += syms[i]; n -= vals[i]; }
  }
  return result;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── MODO ZEN AVANZADO ──
function toggleFocusMode() {
  const isFocusMode = document.body.classList.toggle('focus-mode');
  const btnFocus = document.getElementById('btn-focus');
  btnFocus.textContent = isFocusMode ? 'Modo Zen: ON' : 'Modo Zen';
  
  if (isFocusMode) {
    const activeEl = document.activeElement;
    if (activeEl && activeEl.closest('.chapter')) {
      activeEl.closest('.chapter').classList.add('active-focus');
    } else {
      // Si no hay nada seleccionado, enfoca el primer capítulo disponible
      const firstCh = document.querySelector('.chapter');
      if (firstCh) {
        firstCh.classList.add('active-focus');
        firstCh.querySelector('.chapter-body').focus();
      }
    }
  } else {
    document.querySelectorAll('.chapter').forEach(ch => ch.classList.remove('active-focus'));
  }
}

// ── ATAJOS DE TECLADO ──
document.addEventListener('keydown', e => {
    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
    const modifier = isMac ? e.metaKey : e.ctrlKey;

    if (modifier && e.key === 'f') {
        e.preventDefault();
        toggleFocusMode();
    }
    else if (modifier && e.key === 'Enter') {
        e.preventDefault();
        addChapter();
    }
    else if (modifier && e.key === 's') {
        e.preventDefault();
        exportHTML();
    }
    else if (modifier && e.key === 'o') {
        e.preventDefault();
        document.querySelector('input[type="file"]').click();
    }
});

// ── AUTOSAVE CORE ──
function saveLocal() {
    const chapters = [];
    document.querySelectorAll('.chapter').forEach(ch => {
        chapters.push({
            title: ch.querySelector('.chapter-title-input').value,
            body: ch.querySelector('.chapter-body').value
        });
    });

    localStorage.setItem('escritura_chapters_backup', JSON.stringify(chapters));
    localStorage.setItem('escritura_title_backup', document.getElementById('cover-title').value);
    localStorage.setItem('escritura_author_backup', document.getElementById('cover-author').value);
    localStorage.setItem('escritura_wordcount_backup', document.getElementById('wordcount').textContent);
}

function loadLocal() {
    const title = localStorage.getItem('escritura_title_backup');
    const author = localStorage.getItem('escritura_author_backup');
    const chaptersRaw = localStorage.getItem('escritura_chapters_backup');
    const wordcount = localStorage.getItem('escritura_wordcount_backup');

    if (title || author || chaptersRaw) {
        document.getElementById('chapters').innerHTML = '';
        chapterCount = 0;

        document.getElementById('cover-title').value = title || '';
        document.getElementById('cover-author').value = author || '';
        document.getElementById('book-title-bar').value = title || '';
        document.getElementById('wordcount').textContent = wordcount || '0 palabras';
        autoResize(document.getElementById('cover-title'));

        let chapters = [];
        try { chapters = JSON.parse(chaptersRaw) || []; } catch(e) {}

        chapters.forEach(ch => addChapter(ch.title, ch.body, false));
        resizeAll();
    } else {
        addChapter('', '', false);
    }
}

// ── EXPORTAR E IMPORTAR MANUSCRITOS ──
function exportHTML() {
  saveLocal();
  const title = document.getElementById('cover-title').value || 'sin-titulo';
  const author = document.getElementById('cover-author').value || '';

  const chapters = [];
  document.querySelectorAll('.chapter').forEach(ch => {
    chapters.push({
      title: ch.querySelector('.chapter-title-input').value,
      body: ch.querySelector('.chapter-body').value
    });
  });

  const chaptersData = JSON.stringify(chapters).replace(/</g,'\\u003c');

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>${escHtml(title)}</title>
<meta name="x-escritura-export" content="true">
<meta name="x-escritura-title" content="${escHtml(title)}">
<meta name="x-escritura-author" content="${escHtml(author)}">
<meta name="x-escritura-chapters" content='${chaptersData.replace(/'/g,"&apos;")}'>
<style>
  body{font-family:'EB Garamond',Georgia,serif;max-width:640px;margin:60px auto;padding:0 40px;color:#1a1a1a;background:#fbf9f5;font-size:18px;line-height:1.95}
  h1{font-size:38px;text-align:center;margin-bottom:8px;font-family:serif;}
  .author{text-align:center;font-style:italic;color:#555;margin-bottom:60px}
  .chapter-num{font-size:13px;color:#2e432e;letter-spacing:.08em;text-transform:uppercase;font-style:italic;margin-bottom:6px}
  h2{font-size:26px;margin-bottom:32px;font-family:serif;}
  p{margin-bottom:0;text-indent:2em;text-align:justify;}
  h1 + p, h2 + p, hr + p, p:first-of-type{text-indent:0}
  hr{border:none;border-top:1px solid #c8c2b4;margin:40px auto;width:60px}
</style>
</head>
<body>
<h1>${escHtml(title)}</h1>
${author ? `<p class="author">${escHtml(author)}</p>` : ''}
${chapters.map((ch, i) => `
<hr>
<div class="chapter-num">Capítulo ${toRoman(i+1)}</div>
${ch.title ? `<h2>${escHtml(ch.title)}</h2>` : ''}
${ch.body.split('\n').filter(l=>l.trim()).map(l=>`<p>${escHtml(l)}</p>`).join('\n')}
`).join('\n')}
</body>
</html>`;

  download(html, slugify(title) + '.html', 'text/html');
}

function importHTML(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(e.target.result, 'text/html');

    const isExport = doc.querySelector('meta[name="x-escritura-export"]');
    if (!isExport) {
      alert('Este archivo no corresponde a un export oficial.');
      return;
    }

    const title = doc.querySelector('meta[name="x-escritura-title"]')?.content || '';
    const author = doc.querySelector('meta[name="x-escritura-author"]')?.content || '';
    const chaptersRaw = doc.querySelector('meta[name="x-escritura-chapters"]')?.content || '[]';

    let chapters = [];
    try { chapters = JSON.parse(chaptersRaw); } catch(e) {}

    document.getElementById('cover-title').value = title;
    document.getElementById('cover-author').value = author;
    document.getElementById('book-title-bar').value = title;
    autoResize(document.getElementById('cover-title'));

    document.getElementById('chapters').innerHTML = '';
    chapterCount = 0;
    chapters.forEach(ch => addChapter(ch.title, ch.body, false));
    updateWordCount();
    saveLocal();
    
    setTimeout(() => { resizeAll(); }, 50);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function download(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function slugify(str) {
  return str.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'') || 'manuscrito';
}

document.addEventListener('input', updateWordCount);
</script>
